name: Package Quality and Readiness

on:
  pull_request:
  push:
    branches: [main]

jobs:
  package-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Run package quality gate
        run: python scripts/check_package_quality.py

  automated-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11"]
        include:
          - suite: docs-contracts
            command: python -m unittest -v tests.test_docs_recipes tests.test_stability_contract tests.test_public_api tests.test_cli_version
          - suite: readiness-smoke
            command: python -m unittest -v tests.test_quickstart_smoke tests.test_ready_command tests.test_readiness_artifacts tests.test_doctor_behavior
          - suite: machine-contracts
            command: python -m unittest -v tests.test_machine_output_contract
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install runtime from source
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run ${{ matrix.suite }} on ${{ matrix.os }} / py${{ matrix.python-version }}
        run: ${{ matrix.command }}

  readiness-gate:
    if: ${{ always() }}
    needs:
      - package-quality
      - automated-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install skillsmith runtime from source
        run: python -m pip install -e .

      - name: Run readiness gate
        run: |
          python -m skillsmith ready
          python -m skillsmith report --artifact-dir .agent/reports/readiness

      - name: Upload readiness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: readiness-artifacts
          path: .agent/reports/readiness/
          if-no-files-found: warn

      - name: Publish readiness summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Skillsmith Readiness"
            if [ -f ".agent/reports/readiness/readiness_pr.md" ]; then
              cat .agent/reports/readiness/readiness_pr.md
            else
              echo "- Readiness snippet not found. See uploaded artifacts."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
